services:
  - type: web
    name: demoforge-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: apps/api
    buildCommand: npm install && npx playwright install --with-deps chromium && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: ONEBASTION_PLATFORM_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
